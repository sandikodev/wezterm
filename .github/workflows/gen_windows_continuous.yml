name: windows_continuous

on:
  schedule:
    - cron: "10 3 * * *"
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".cargo/config.toml"
      - ".github/workflows/gen_windows_continuous.yml"
      - "assets/fonts/**/*"
      - "assets/icon/*"
      - "assets/windows/**/*"
      - "ci/deploy.sh"
      - "ci/windows-installer.iss"

jobs:
  build:
    runs-on: "windows-2022"
    
    env:
      BUILD_REASON: "Schedule"
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"

    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          target: "x86_64-pc-windows-msvc"
      - name: "Compile with sccache"
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: "Cache Rust Dependencies"
        uses: actions/cache@v4
        id: cache-cargo-vendor
        with:
          path: |
            vendor
            .cargo/config
          key: "cargo-deps-${{ hashFiles('**/Cargo.lock') }}"
      - name: "Vendor dependecies"
        if: steps.cache-cargo-vendor.outputs.cache-hit != 'true'
        shell: bash
        run: "cargo vendor --locked --versioned-dirs >> .cargo/config"
      - name: "Build wezterm (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm --release
      - name: "Build wezterm-gui (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm-gui --release
      - name: "Build wezterm-mux-server (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm-mux-server --release
      - name: "Build strip-ansi-escapes (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p strip-ansi-escapes --release
      - name: "Install cargo-nextest from Cargo"
        uses: baptiste0928/cargo-install@v3
        with:
          crate: "cargo-nextest"
          cache-key: "windows"
      - name: "Test"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo nextest run --all --no-fail-fast
      - name: "Package"
        shell: bash
        run: "bash ci/deploy.sh"
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "windows"
          path: |
            WezTerm-*.zip
            WezTerm-*.exe
          retention-days: 5

  upload:
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'wezterm/wezterm'
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
      - name: "Download artifact"
        uses: actions/download-artifact@v4
        with:
          name: "windows"
      - name: "Checksum"
        shell: bash
        run: "for f in WezTerm-*.zip WezTerm-*.exe ; do sha256sum $f > $f.sha256 ; done"
      - name: "Upload to Nightly Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: "bash ci/retry.sh gh release upload --clobber nightly WezTerm-*.zip WezTerm-*.exe *.sha256"
      - name: "Checkout winget-pkgs"
        uses: actions/checkout@v4
        with:
          repository: "microsoft/winget-pkgs"
          path: "winget-pkgs"
          token: "${{ secrets.GH_PAT }}"
          fetch-depth: 0
      - name: "Setup email for winget repo"
        shell: bash
        run: "cd winget-pkgs && git config user.email wez@wezfurlong.org"
      - name: "Setup name for winget repo"
        shell: bash
        run: "cd winget-pkgs && git config user.name 'Wez Furlong'"
      - name: "Compute Sha256 hash"
        id: hash
        shell: bash
        run: |
          echo "sha256=$(sha256sum -b WezTerm-*.exe | cut -f1 -d' ' | tr a-f A-F)" >> $GITHUB_OUTPUT
      - name: "Update winget nightly manifest"
        shell: bash
        run: |
          cd winget-pkgs
          NIGHTLY_DIR="manifests/w/wez/wezterm.nightly"
          if [ -d "$NIGHTLY_DIR" ]; then
            cd "$NIGHTLY_DIR"
            LATEST_VERSION=$(ls -1 | sort -r | head -1)
            if [ -n "$LATEST_VERSION" ] && [ -f "$LATEST_VERSION/wez.wezterm.nightly.installer.yaml" ]; then
              sed -i "s/InstallerSha256:.*/InstallerSha256: ${{ steps.hash.outputs.sha256 }}/" "$LATEST_VERSION/wez.wezterm.nightly.installer.yaml"
              echo "Updated nightly manifest: $LATEST_VERSION"
            fi
          else
            echo "No nightly manifest found"
            exit 1
          fi
      - name: "Commit and push winget changes"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          cd winget-pkgs
          git add --all
          git diff --cached --quiet || git commit -m "wezterm nightly: update installer hash" || echo "No changes to commit"
          git push origin master --quiet || echo "Push skipped - no changes"
      - name: "Submit winget PR"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          cd winget-pkgs
          if git diff --quiet; then
            echo "No changes to push"
          else
            BRANCH="wezterm-nightly-$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git push --set-upstream origin "$BRANCH" --quiet
            gh pr create --fill --body "Auto-update wezterm nightly installer hash" --base master --repo Microsoft/winget-pkgs || echo "PR creation skipped or failed"
          fi
